name: Build and push images

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      push_version_tags:
        description: "Push semver version tags (e.g. 1.0.0, 1.0, 1)"
        type: boolean
        default: true
      push_latest:
        description: "Push the latest tag"
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Resolve version from latest git tag
        id: version
        run: |
          TAG=$(git describe --tags --match "v[0-9]*.[0-9]*.[0-9]*" --abbrev=0 2>/dev/null || echo "")
          if [ -n "$TAG" ]; then
            VERSION="${TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "major_minor=$MAJOR.$MINOR" >> $GITHUB_OUTPUT
            echo "major=$MAJOR" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- pz-app ---

      - name: Extract metadata (pz-app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/pz-app
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version.outputs.found == 'true' && (github.event_name != 'workflow_dispatch' || inputs.push_version_tags == 'true') }}
            type=raw,value=${{ steps.version.outputs.major_minor }},enable=${{ steps.version.outputs.found == 'true' && (github.event_name != 'workflow_dispatch' || inputs.push_version_tags == 'true') }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ steps.version.outputs.found == 'true' && (github.event_name != 'workflow_dispatch' || inputs.push_version_tags == 'true') }}
            type=sha
          flavor: |
            latest=${{ github.event_name != 'workflow_dispatch' || inputs.push_latest == 'true' }}

      - name: Build and push pz-app
        uses: docker/build-push-action@v6
        with:
          context: ./app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha,scope=pz-app
          cache-to: type=gha,mode=max,scope=pz-app

      # --- pz-game-server ---

      - name: Extract metadata (pz-game-server)
        id: meta-game-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/pz-game-server
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version.outputs.found == 'true' && (github.event_name != 'workflow_dispatch' || inputs.push_version_tags == 'true') }}
            type=raw,value=${{ steps.version.outputs.major_minor }},enable=${{ steps.version.outputs.found == 'true' && (github.event_name != 'workflow_dispatch' || inputs.push_version_tags == 'true') }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ steps.version.outputs.found == 'true' && (github.event_name != 'workflow_dispatch' || inputs.push_version_tags == 'true') }}
            type=sha
          flavor: |
            latest=${{ github.event_name != 'workflow_dispatch' || inputs.push_latest == 'true' }}

      - name: Build and push pz-game-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: game-server/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta-game-server.outputs.tags }}
          labels: ${{ steps.meta-game-server.outputs.labels }}
          cache-from: type=gha,scope=pz-game-server
          cache-to: type=gha,mode=max,scope=pz-game-server
